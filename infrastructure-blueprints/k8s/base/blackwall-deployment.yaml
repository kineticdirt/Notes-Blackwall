apiVersion: apps/v1
kind: Deployment
metadata:
  name: blackwall
  labels:
    app: blackwall
spec:
  replicas: 2
  selector:
    matchLabels:
      app: blackwall
  template:
    metadata:
      labels:
        app: blackwall
    spec:
      containers:
        - name: blackwall
          image: blackwall:latest
          ports:
            - containerPort: 8000
          env:
            - name: LOG_LEVEL
              value: "info"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: blackwall-secrets
                  key: anthropic-api-key
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
