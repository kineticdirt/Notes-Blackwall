version: "3.9"

x-common: &common
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:

  blackwall:
    <<: *common
    build:
      context: ../../blackwall
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LOG_LEVEL=info
    volumes:
      - blackwall-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  workflow-canvas:
    <<: *common
    build:
      context: ../../workflow-canvas
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - MCP_ENDPOINT=http://blackwall:8000/mcp
    depends_on:
      blackwall:
        condition: service_healthy

  api-gateway:
    <<: *common
    build:
      context: ../../api-gateway
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    environment:
      - BLACKWALL_URL=http://blackwall:8000
      - WORKFLOW_CANVAS_URL=http://workflow-canvas:8080
      - RATE_LIMIT_RPM=60
    depends_on:
      - blackwall
      - workflow-canvas

  redis:
    <<: *common
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  postgres:
    <<: *common
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=cequence
      - POSTGRES_USER=cequence
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pg-data:/var/lib/postgresql/data

  prometheus:
    <<: *common
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ../observability-stack/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom-data:/prometheus

  grafana:
    <<: *common
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana

volumes:
  blackwall-data:
  redis-data:
  pg-data:
  prom-data:
  grafana-data:
