pipeline:
  name: cequence-main
  mode: watch
  interval_seconds: 30

collectors:
  agent_ledger:
    type: json_file
    path: ../ledger/AI_GROUPCHAT.json
    poll_interval: 10

  overseer_log:
    type: tail_file
    path: ../.overseer/overseer.log
    poll_interval: 5

  competition_results:
    type: glob_json
    pattern: ../results/**/*.json
    poll_interval: 60

transforms:
  - type: enrich
    fields:
      pipeline: cequence-main
      environment: dev

  - type: deduplicate
    key_fields: [source, timestamp, event_type]

  - type: filter
    exclude:
      event_type: [heartbeat, ping]

sinks:
  sqlite:
    type: sqlite
    path: ./data/events.db
    table: pipeline_events

  json_archive:
    type: json_file
    path: ./data/events.jsonl
    mode: append

  metrics:
    type: prometheus
    port: 9091
    prefix: cequence_pipeline
