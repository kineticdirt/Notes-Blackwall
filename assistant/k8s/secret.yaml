# Do NOT put your real key in this file. Create the secret with kubectl:
#
#   kubectl create secret generic assistant-llm-key \
#     --from-file=ANTHROPIC_API_KEY=assistant/llm_keys/ANTHROPIC_API_KEY
#
# Or: kubectl create secret generic assistant-llm-key --from-literal=ANTHROPIC_API_KEY='sk-ant-...'
#
# Then deploy: kubectl apply -f configmap.yaml -f deployment.yaml -f service.yaml
# (Skip this secret.yaml — it's only a reference.)
apiVersion: v1
kind: Secret
metadata:
  name: assistant-llm-key
  namespace: default
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "REPLACE_VIA_KUBECTL_CREATE_SECRET"
