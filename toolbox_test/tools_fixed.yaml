# MCP Toolbox Configuration - Fixed Format
# Based on official Toolbox documentation format

sources:
  - kind: sources
    type: sqlite
    database: .worktrees/worktree.db

tools:
  - kind: tools
    name: get_kanban_cards
    type: postgres-sql
    source: test-sqlite-source
    description: Get Kanban cards by status. Integrates with our Kanban board system.
    parameters:
      - name: status
        type: string
        description: Card status (todo, in_progress, review, done)
    statement: |
      SELECT card_id, title, description, status, assignee, priority
      FROM cards
      WHERE status = $1
      ORDER BY priority DESC

toolsets:
  kanban_toolset:
    - get_kanban_cards
